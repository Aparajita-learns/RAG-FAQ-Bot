name: Daily Mutual Fund Scraper

on:
  schedule:
    # Runs at 9:15 AM UTC daily (modify for IST by subtracting 5.5 hours if needed, 03:45 AM UTC = ~09:15 AM IST)
    # Groww NAVs update usually overnight, so a morning scrape captures the latest info.
    - cron: '45 3 * * *'
  workflow_dispatch: # Allows manual trigger from github actions UI

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies
          
      - name: Install dependencies
        run: |
          cd scraping_service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: |
          python scraping_service/scraper.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-update raw html via daily scraper" || true
          git push origin HEAD:main
          
      - name: Install Embedder dependencies
        run: |
          cd chunking_embedding_service
          pip install -r requirements.txt
          
      - name: Run Embedder to Chroma Cloud
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_DATABASE: "RAG_chatbot_database"
          CHROMA_TENANT: "55f74872-3fe6-4e35-ab34-fd70ca9022fc"
        run: |
          python chunking_embedding_service/embedder.py

      - name: Verify Chroma Cloud State
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_DATABASE: "RAG_chatbot_database"
          CHROMA_TENANT: "55f74872-3fe6-4e35-ab34-fd70ca9022fc"
        run: |
          python chunking_embedding_service/check_chroma.py
