name: Daily Mutual Fund Scraper

on:
  schedule:
    # Runs at 9:15 AM UTC daily (modify for IST by subtracting 5.5 hours if needed, 03:45 AM UTC = ~09:15 AM IST)
    # Groww NAVs update usually overnight, so a morning scrape captures the latest info.
    - cron: '45 3 * * *'
  workflow_dispatch: # Allows manual trigger from github actions UI

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies
          
      - name: Install dependencies
        run: |
          cd scraping_service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: |
          python scraping_service/scraper.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw_html/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update raw html via daily scraper" && git push)
          
      - name: Install Embedder dependencies
        run: |
          cd chunking_embedding_service
          pip install -r requirements.txt
          
      - name: Run Embedder to Chroma Cloud
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
        run: |
          python chunking_embedding_service/embedder.py
